<!DOCTYPE html>
<html>
<head>
    <title>快速更新结果</title>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 50px; }
        .container { max-width: 600px; margin: 0 auto; }
        .success { color: #28a745; background: #d4edda; padding: 15px; border-radius: 5px; }
        .error { color: #dc3545; background: #f8d7da; padding: 15px; border-radius: 5px; }
        .info { color: #0c5460; background: #d1ecf1; padding: 15px; border-radius: 5px; }
        .btn { background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 10px 5px; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Partition列配置更新</h1>
        
        {% if success == True %}
            <div class="success">
                <h3>✅ 更新成功！</h3>
                <p>{{ message }}</p>
                {% if result %}
                <pre>{{ result | json }}</pre>
                {% endif %}
            </div>
        {% elif success == False %}
            <div class="error">
                <h3>❌ 更新失败</h3>
                <p>{{ message }}</p>
                {% if error %}
                <pre>错误详情: {{ error }}</pre>
                {% endif %}
            </div>
        {% else %}
            <div class="info">
                <h3>📋 可用操作</h3>
                <p>选择要执行的操作：</p>
                <a href="?action=update_columns" class="btn">🚀 更新所有Partition列配置</a>
            </div>
        {% endif %}
        
        <div style="margin-top: 30px;">
            <a href="/project_management" class="btn">🏠 返回项目管理</a>
            <a href="/admin/column_updater.html" class="btn">🔧 列配置工具</a>
        </div>
    </div>
</body>
</html>
