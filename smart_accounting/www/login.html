{% extends "templates/web.html" %}

{% block title %}Smart Accounting - Login{% endblock %}

{% block style %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="/assets/smart_accounting/css/login.css">
{% endblock %}

{% block page_content %}
<div class="login-page-body">
    <div class="login-container">
        <div class="login-header">
            <h1>
                <i class="fa fa-calculator"></i>
                Smart Accounting
            </h1>
            <p>Professional Accounting Management System</p>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="alert" id="alertMessage"></div>
            
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" class="form-input" required 
                       placeholder="Enter your username or email address" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required 
                       placeholder="Enter your password" autocomplete="current-password">
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">Sign In</span>
            </button>
            
            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword()">Forgot your password?</a>
            </div>
        </form>
        
        <div class="login-footer">
            <p>&copy; 2024 Smart Accounting. All rights reserved.</p>
        </div>
    </div>

    <script>
        // Login form handling
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const alertDiv = document.getElementById('alertMessage');
            
            // Validate inputs
            if (!username || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }
            
            // Basic validation for username/email format
            if (username.length < 3) {
                showAlert('Username or email must be at least 3 characters long', 'error');
                return;
            }
            
            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            hideAlert();
            
            try {
                // Call Frappe login API
                const response = await fetch('/api/method/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        usr: username,
                        pwd: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.message === 'Logged In') {
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Clear form for security
                    document.getElementById('password').value = '';
                    
                    // Redirect to project management after short delay
                    setTimeout(() => {
                        window.location.href = '/project_management';
                    }, 1000);
                } else {
                    // Handle login error
                    let errorMessage = 'Invalid email or password';
                    
                    if (data.message) {
                        errorMessage = data.message;
                    } else if (data.exc) {
                        // Parse exception message for user-friendly display
                        const excString = data.exc;
                        if (excString.includes('Invalid Login Credentials')) {
                            errorMessage = 'Invalid email or password';
                        } else if (excString.includes('User disabled')) {
                            errorMessage = 'Your account has been disabled. Please contact administrator.';
                        } else {
                            errorMessage = 'Login failed. Please try again.';
                        }
                    }
                    
                    showAlert(errorMessage, 'error');
                    
                    // Clear password field for security
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error. Please try again.', 'error');
            } finally {
                // Hide loading state
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
        }
        
        function hideAlert() {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.style.display = 'none';
        }
        
        function showForgotPassword() {
            alert('Password reset functionality will be available soon. Please contact your administrator.');
        }
        
        // Add input validation feedback
        document.getElementById('username').addEventListener('input', function(e) {
            const username = e.target.value.trim();
            const isEmail = username.includes('@') && username.includes('.');
            
            // Update placeholder text based on input
            if (username.length > 0) {
                if (isEmail) {
                    e.target.setAttribute('data-type', 'email');
                } else {
                    e.target.setAttribute('data-type', 'username');
                }
            }
        });
        
        // Check if user is already logged in
        checkLoginStatus();
        
        // Auto-focus username field
        document.getElementById('username').focus();
        
        function checkLoginStatus() {
            // Check if user is already logged in by making a simple API call
            fetch('/api/method/smart_accounting.www.project_management.index.handle_login_redirect', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.message && data.message.success) {
                    // User is already logged in, redirect to project management
                    showAlert('You are already logged in. Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/project_management';
                    }, 1000);
                }
            })
            .catch(error => {
                // Ignore errors, user probably not logged in
                console.log('User not logged in, showing login form');
            });
        }
        
        // Handle Enter key in password field
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</div>
{% endblock %}
